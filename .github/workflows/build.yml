name: Build PitWall AI EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'daemon/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pynput pygame edge-tts pyinstaller pywin32

      - name: Build Setup EXE
        run: |
          cd daemon
          python -m PyInstaller --onefile --console --name PitWallAI-Setup --add-data "pitwall;pitwall" --hidden-import requests pitwall_setup_entry.py

      - name: Clean between builds
        shell: pwsh
        run: |
          Remove-Item -Path "daemon\*.spec" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "daemon\build" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build Daemon EXE
        run: |
          cd daemon
          python -m PyInstaller --onefile --noconsole --name PitWallAI --add-data "pitwall;pitwall" --hidden-import requests --hidden-import pynput --hidden-import pynput.keyboard --hidden-import pygame --hidden-import ctypes --hidden-import edge_tts --hidden-import asyncio pitwall_daemon_entry.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-Windows
          path: |
            daemon/dist/PitWallAI-Setup.exe
            daemon/dist/PitWallAI.exe
          retention-days: 30
