name: Build PitWall AI EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'daemon/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests keyboard pygame pyinstaller

      - name: Build Setup EXE (with console)
        working-directory: daemon
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name PitWallAI-Setup `
            --add-data "pitwall;pitwall" `
            pitwall_setup_entry.py

      - name: Build Daemon EXE (headless)
        working-directory: daemon
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name PitWallAI `
            --add-data "pitwall;pitwall" `
            pitwall_daemon_entry.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-Windows
          path: |
            daemon/dist/PitWallAI-Setup.exe
            daemon/dist/PitWallAI.exe
          retention-days: 30
