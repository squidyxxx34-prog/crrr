name: Build PitWall AI EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'daemon/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests keyboard pygame pyinstaller

      - name: Build EXE
        working-directory: daemon
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name PitWallAI `
            --add-data "pitwall;pitwall" `
            pitwall_launcher.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-Windows
          path: daemon/dist/PitWallAI.exe
          retention-days: 30
