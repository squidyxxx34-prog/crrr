name: Build PitWall AI EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'daemon/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pynput pygame edge-tts sounddevice numpy pyinstaller pywin32

      - name: Build Setup EXE
        run: |
          cd daemon
          python -m PyInstaller --onefile --console --name PitWallAI-Setup --add-data "pitwall;pitwall" --hidden-import requests pitwall_setup_entry.py

      - name: Clean between builds
        shell: pwsh
        run: |
          Remove-Item -Path "daemon\*.spec" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "daemon\build" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build Daemon EXE
        run: |
          cd daemon
          python -m PyInstaller --onefile --noconsole --name PitWallAI --add-data "pitwall;pitwall" --collect-all sounddevice --hidden-import requests --hidden-import pynput --hidden-import pynput.keyboard --hidden-import pygame --hidden-import edge_tts --hidden-import asyncio --hidden-import sounddevice --hidden-import numpy --hidden-import ctypes --hidden-import wave pitwall_daemon_entry.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-Windows
          path: |
            daemon/dist/PitWallAI-Setup.exe
            daemon/dist/PitWallAI.exe
          retention-days: 30

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.run_number }}"
          gh release create "$TAG" \
            daemon/dist/PitWallAI.exe \
            daemon/dist/PitWallAI-Setup.exe \
            --title "PitWall AI $TAG" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --repo squidyxxx34-prog/crrr
