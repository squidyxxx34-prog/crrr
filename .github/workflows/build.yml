name: Build PitWall AI EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'daemon/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests keyboard pygame pyinstaller
          pip install pywin32

      - name: Build Setup EXE
        run: |
          cd daemon
          python -m PyInstaller `
            --onefile `
            --console `
            --name PitWallAI-Setup `
            --add-data "pitwall;pitwall" `
            --hidden-import requests `
            --hidden-import json `
            --hidden-import pathlib `
            pitwall_setup_entry.py

      - name: Clean between builds
        run: |
          cd daemon
          if exist "*.spec" del /f /q "*.spec"
          if exist "build" rmdir /s /q "build"

      - name: Build Daemon EXE
        run: |
          cd daemon
          python -m PyInstaller `
            --onefile `
            --noconsole `
            --name PitWallAI `
            --add-data "pitwall;pitwall" `
            --hidden-import requests `
            --hidden-import keyboard `
            --hidden-import pygame `
            --hidden-import ctypes `
            pitwall_daemon_entry.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PitWallAI-Windows
          path: |
            daemon/dist/PitWallAI-Setup.exe
            daemon/dist/PitWallAI.exe
          retention-days: 30
